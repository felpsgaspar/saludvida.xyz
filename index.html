<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabriela Santoyo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Barra de aviso ── */
    .warning-bar {
      background-color: #b30000;
      color: #fff;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-align: center;
      padding: 10px 16px;
      width: 100%;
      max-width: 680px;
      border-radius: 4px;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    /* ── Bloco VSL ── */
    .vsl-wrapper {
      width: 100%;
      max-width: 680px;
      margin-bottom: 28px;
    }

    /* 
      ════════════════════════════════════════════════
      COLE O CÓDIGO DO SEU PLAYER DE VSL AQUI DENTRO
      (VTurb, Vimeo, YouTube embed, etc.)
      O div.vsl-wrapper já tem aspect-ratio 16:9.
      ════════════════════════════════════════════════
    */
    .vsl-placeholder {
      color: #555;
      font-size: 0.9rem;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    /* ── Headline ── */
    .headline {
      font-size: 1.4rem;
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
      max-width: 600px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    /* ── Subheadline ── */
    .subheadline {
      font-size: 1rem;
      text-align: center;
      color: #ccc;
      max-width: 520px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* ── Contador de viewers ── */
    .viewers-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 8px 18px;
      margin-bottom: 22px;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      color: #e0e0e0;
    }

    .viewers-dot {
      width: 10px;
      height: 10px;
      background: #00e676;
      border-radius: 50%;
      box-shadow: 0 0 8px #00e676;
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    #viewer-count {
      font-weight: bold;
      color: #fff;
    }

    /* ── Rodapé ── */
    footer {
      margin-top: auto;
      font-size: 0.75rem;
      color: #444;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <!-- AVISO DE URGÊNCIA -->
  <div class="warning-bar">
    ⚠️ AVISO: Debido a la naturaleza sensible de este contenido, esta página saldrá del aire a medianoche del día de hoy.
  </div>

  <!-- VSL PLAYER -->
  <div class="vsl-wrapper">
    <vturb-smartplayer id="ab-6a3976358136b4416dd4a830" style="display: block; margin: 0 auto; width: 100%;"></vturb-smartplayer>
    <script type="text/javascript">
      var s = document.createElement("script");
      s.src = "https://scripts.converteai.net/e2e167ab-be2b-4ff3-89f5-23c649c70174/ab-test/6a3976358136b4416dd4a830/player.js";
      s.async = !0;
      document.head.appendChild(s);
    </script>
  </div>

  <!-- CONTADOR DE VIEWERS -->
  <div class="viewers-bar">
    <span class="viewers-dot"></span>
    <span><span id="viewer-count">233</span> personas viendo ahora</span>
  </div>

  <!-- HEADLINE -->
  <h1 class="headline">Este contenido será removido en breve:</h1>

  <!-- RODAPÉ -->
  <footer>Copyright 2025 – Todos los derechos reservados.</footer>

  <script>
    // Contador que sobe rápido, com pequenas variações aleatórias
    let count = 233;
    const el = document.getElementById('viewer-count');

    function updateCount() {
      // Sobe entre 1 e 4 a cada tick
      const delta = Math.floor(Math.random() * 4) + 1;
      count += delta;
      // Mantém num range realista (200–520)
      if (count > 520) count = 200 + Math.floor(Math.random() * 40);
      el.textContent = count;
      // Intervalo entre 400ms e 900ms
      const next = 400 + Math.floor(Math.random() * 500);
      setTimeout(updateCount, next);
    }

    setTimeout(updateCount, 800);
  </script>

</body>
</html>
